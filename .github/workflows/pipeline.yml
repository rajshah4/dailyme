name: Trigger Pipeline (OpenHands Cloud)

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Manual trigger

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Just triggering API, not running the pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Trigger OpenHands Cloud pipeline
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
        run: python scripts/openhands_trigger.py
        
      - name: Summary
        run: |
          echo "✅ Pipeline triggered on OpenHands Cloud"
          echo "🔗 All heavy compute happens there (not in GitHub Actions)"
