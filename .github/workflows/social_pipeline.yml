name: Trigger Social Pipeline (OpenHands Cloud)

on:
  workflow_dispatch: # Manual trigger only — scheduling handled by OpenHands Automations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger-social:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Trigger OpenHands Cloud social pipeline
        env:
          OPENHANDS_API_KEY: ${{ secrets.OPENHANDS_API_KEY }}
        run: python scripts/openhands_trigger_social.py

      - name: Summary
        run: |
          echo "✅ Social top-stories pipeline triggered on OpenHands Cloud"
          echo "📡 Feed endpoint: /social/rss.xml"
